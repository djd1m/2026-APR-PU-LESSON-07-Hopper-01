services:
  # ─── API Server (NestJS) — dev mode with source mount ─────
  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm --filter @hopperru/db run build && pnpm --filter @hopperru/shared run build && pnpm --filter @hopperru/api run build && node packages/api/dist/main.js"
    ports:
      - "${API_PORT:-9100}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hopperru:${DB_PASSWORD}@postgres:5432/hopperru
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET=${YOOKASSA_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ML_SERVICE_URL=http://ml:8000
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hopperru

  # ─── Web Frontend (Next.js) — dev mode ────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm --filter @hopperru/shared run build && pnpm --filter @hopperru/web run build && npx --filter @hopperru/web next start -p 3000"
    ports:
      - "${WEB_PORT:-9101}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NODE_ENV=production
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hopperru

  # ─── ML Service (FastAPI) ──────────────────────────────────
  ml:
    build:
      context: .
      dockerfile: Dockerfile
      target: ml
    ports:
      - "${ML_PORT:-9102}:8000"
    environment:
      - DATABASE_URL=postgresql://hopperru:${DB_PASSWORD}@postgres:5432/hopperru
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hopperru

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hopperru
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=hopperru
    ports:
      - "127.0.0.1:${PG_PORT:-9103}:5432"
    volumes:
      - hopperru-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopperru"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hopperru

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-9104}:6379"
    volumes:
      - hopperru-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - hopperru

  # ─── ClickHouse (Analytics) ────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "127.0.0.1:${CH_HTTP_PORT:-9105}:8123"
    volumes:
      - hopperru-clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_USER=hopperru
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=analytics
    restart: unless-stopped
    networks:
      - hopperru

volumes:
  hopperru-postgres-data:
  hopperru-redis-data:
  hopperru-clickhouse-data:
  api_node_modules:
  web_node_modules:

networks:
  hopperru:
    driver: bridge
