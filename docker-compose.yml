version: "3.9"

services:
  # ─── API Server (NestJS) ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hopperru:${DB_PASSWORD}@postgres:5432/hopperru
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET=${YOOKASSA_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - INSURANCE_PARTNER_API_URL=${INSURANCE_PARTNER_API_URL}
      - INSURANCE_PARTNER_API_KEY=${INSURANCE_PARTNER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    networks:
      - hopperru

  # ─── Web Frontend (Next.js) ────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - hopperru

  # ─── Telegram Bot (telegraf.js) ────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:3000
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - hopperru

  # ─── ML Service (FastAPI + scikit-learn) ───────────────────
  ml:
    build:
      context: .
      dockerfile: Dockerfile
      target: ml
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://hopperru:${DB_PASSWORD}@postgres:5432/hopperru
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123
      - MODEL_PATH=/app/models
    volumes:
      - ml-models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
    networks:
      - hopperru

  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hopperru
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=hopperru
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopperru"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
    networks:
      - hopperru

  # ─── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    networks:
      - hopperru

  # ─── ClickHouse (Analytics) ────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_USER=hopperru
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=analytics
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
    networks:
      - hopperru

  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - hopperru

volumes:
  postgres-data:
  redis-data:
  clickhouse-data:
  ml-models:

networks:
  hopperru:
    driver: bridge
